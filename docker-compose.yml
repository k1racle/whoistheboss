services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guessboss-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-guessboss}?schema=public
      SESSION_SECRET: ${SESSION_SECRET}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:-admin123}
      UPLOAD_DIR: ${UPLOAD_DIR:-./public/uploads}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-100}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      FROM_EMAIL: ${FROM_EMAIL:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      SITE_URL: ${SITE_URL:-http://localhost:3000}
      SITE_NAME: ${SITE_NAME:-Кто здесь главный?}
      SITE_DESCRIPTION: ${SITE_DESCRIPTION:-Интервью с основателями бизнеса. Видео, рилсы, фото.}
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - guessboss-network

  db:
    image: postgres:16-alpine
    container_name: guessboss-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-guessboss}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-guessboss}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - guessboss-network

volumes:
  postgres_data:
  uploads:

networks:
  guessboss-network:
    driver: bridge
